# Release — fires on tags matching `v*`. Builds the Docker image and
# publishes it as `pgweb/postgres:<tag>` + `pgweb/postgres:latest`.
#
# **Currently a draft** — requires `DOCKERHUB_USERNAME` and
# `DOCKERHUB_TOKEN` secrets in the repo settings. Without them the
# publish step skips and the build still happens (so a tag push
# validates the image builds before you configure credentials).
#
# Usage:
#   git tag v0.1.0
#   git push origin v0.1.0
#
# The workflow re-runs the full test suite before publishing — a
# tag pointing at a broken commit won't accidentally ship.

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test-all:
    name: test-all before release
    uses: ./.github/workflows/ci.yml

  publish-image:
    name: build + push pgweb/postgres:${{ github.ref_name }}
    needs: test-all
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        # Strip the `v` prefix: v0.1.0 → 0.1.0.
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        # Only attempts login if the secret is present. A tag push
        # against a fork without the secret still builds but skips
        # publish — useful for validating the build itself.
        if: env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build (and push if creds present)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          # Always build; only push when we managed to log in.
          push: ${{ env.DOCKERHUB_TOKEN != '' }}
          tags: |
            pgweb/postgres:${{ steps.version.outputs.tag }}
            pgweb/postgres:latest
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
