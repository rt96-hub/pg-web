# Release — fires on tags matching `v*`. Builds the Docker image and
# publishes it as `pgweb/postgres:<tag>` + `pgweb/postgres:latest`,
# then publishes the `pg-web` CLI crate to crates.io at the same version.
#
# Requires two secrets (both optional for validation; real publish only
# happens when present):
#   DOCKERHUB_USERNAME + DOCKERHUB_TOKEN  — for the image push
#   CARGO_REGISTRY_TOKEN                  — crates.io API token with
#                                           "publish" scope for the pg-web crate
#
# Usage:
#   git tag v0.3.0
#   git push origin v0.3.0
#
# The workflow re-runs the full test suite (including `cargo publish --dry-run`)
# before any publishing — a tag pointing at a broken commit won't accidentally ship.
# Order: test-all → (publish-image + publish-cli in parallel after tests).

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test-all:
    name: test-all before release
    uses: ./.github/workflows/ci.yml

  publish-image:
    name: build + push pgweb/postgres:${{ github.ref_name }}
    needs: test-all
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        # Strip the `v` prefix: v0.1.0 → 0.1.0.
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        # Only attempts login if the secret is present. A tag push
        # against a fork without the secret still builds but skips
        # publish — useful for validating the build itself.
        if: env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build (and push if creds present)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          # Always build; only push when we managed to log in.
          push: ${{ env.DOCKERHUB_TOKEN != '' }}
          tags: |
            pgweb/postgres:${{ steps.version.outputs.tag }}
            pgweb/postgres:latest
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  publish-cli:
    name: publish pg-web to crates.io
    needs: [test-all, publish-image]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io (guarded)
        # Only attempts publish if the secret is present. Tag pushes from
        # forks or before the owner configures the token will validate the
        # full pipeline (tests + image build) but skip the crates.io upload.
        # The token must be a crates.io API token with publish permission
        # for the `pg-web` crate (created at https://crates.io/settings/tokens
        # with "publish" scope; the account must own/have access to the name).
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: cargo publish -p pg-web --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
