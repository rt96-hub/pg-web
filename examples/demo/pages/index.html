<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Todos</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 520px; margin: 2rem auto; padding: 0 1rem; }
    h1 { margin-bottom: 1rem; }
    form { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    input[type=text] { flex: 1; padding: 0.5rem 0.75rem; font-size: 1rem; border: 1px solid #aaa; border-radius: 4px; }
    button { padding: 0.5rem 1rem; cursor: pointer; border: 1px solid #aaa; border-radius: 4px; background: #f6f6f6; font-size: 0.9rem; }
    button:hover { background: #e8e8e8; }
    ul { list-style: none; padding: 0; margin: 0; }
    li { padding: 0.6rem 0.25rem; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; }
    li.done span.title { color: #888; text-decoration: line-through; }
    li .actions { display: flex; gap: 0.25rem; flex-shrink: 0; }
    .empty { color: #888; font-style: italic; padding: 1rem 0; }
  </style>
</head>
<body>
  <h1>Todos</h1>

  <form hx-post="/todos"
        hx-target="#todos"
        hx-swap="beforeend"
        hx-on::after-request="if(event.detail.successful) this.reset()">
    <input type="text" name="title" placeholder="What needs done?" required autofocus>
    <button>Add</button>
  </form>

  <ul id="todos">
    {% for todo in todos %}
      <li class="{% if todo.done %}done{% endif %}">
        <span class="title">{{ todo.title }}</span>
        <span class="actions">
          <button hx-post="/todos/toggle"
                  hx-vals='{"id": {{ todo.id }}}'
                  hx-target="closest li"
                  hx-swap="outerHTML">Toggle</button>
          <button hx-post="/todos/delete"
                  hx-vals='{"id": {{ todo.id }}}'
                  hx-target="closest li"
                  hx-swap="outerHTML">Delete</button>
        </span>
      </li>
    {% else %}
      <li class="empty">No todos yet. Add one above.</li>
    {% endfor %}
  </ul>
</body>
</html>
